name: Publish effective-modules

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Build and test (effect v3)
        run: bun run build-and-test-3

      - name: Publish (effect v3)
        working-directory: dist
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build and test (effect v4)
        run: bun run build-and-test-4

      - name: Publish (effect v4)
        working-directory: dist
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
